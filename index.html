<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Utama Kompetisi LKS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .main-view-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .main-view-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .main-view-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        .dark .main-view-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
        
        @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
        .animate-pulse-fast { animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100">
    <div id="root"></div>

    <script src="store.js"></script> <script type="text/babel" src="components.js"></script>
    <script type="text/babel" src="admin.js"></script>
    <script type="text/babel" src="script.js"></script>
</body>
</html>
